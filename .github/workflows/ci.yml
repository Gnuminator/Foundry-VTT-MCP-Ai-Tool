name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and lint (green-gate)
        # Documented green-gate: a type/lint error that doesn't break the build
        # must still fail CI. Runs before build to fail fast. `--quiet` on lint
        # suppresses the accepted Foundry-`any` warning baseline (the harness
        # duck-types every Foundry document as `any`, ~11.8k warnings) so CI logs
        # stay readable — the gate still FAILS on any eslint *error* (exit 1).
        run: npm run typecheck && npm run lint -- --quiet

      - name: Build (all workspaces)
        run: npm run build

      - name: Unit tests (shared)
        # Parity + frozen-wire-contract guard for the @gnuminator/shared package.
        run: npm test -w @gnuminator/shared

      - name: Unit tests (foundry module)
        # Scoped to the module suite by workspace name (npm scope is @gnuminator/*).
        run: npm test -w @gnuminator/foundry-module

      - name: Unit tests (mcp-server)
        # Tool-layer + lock suites. vitest auto-runs once in CI (non-TTY).
        run: npm test -w @gnuminator/mcp-server

      - name: Unit tests (cogm-dashboard)
        # Player/GM split: auth role-resolution + server-side redaction.
        run: npm test -w @gnuminator/cogm-dashboard

      - name: MCP schema smoke test
        run: node scripts/mcp-schema-smoke-test.mjs

      - name: Standalone bridge smoke test
        # Spawns the standalone entrypoint in control-only mode on a free port
        # (never 31414/31415/31416) and asserts ping + list_tools over the wire.
        run: node scripts/standalone-smoke-test.mjs

      - name: Player/GM split smoke test
        # Runs the dashboard against a mock bridge and asserts server-side
        # redaction (GM vs player) + the write-surface auth gate over HTTP.
        run: node scripts/cogm-split-smoke-test.mjs

      - name: Validate Foundry module manifest
        run: node validate-manifest.js
